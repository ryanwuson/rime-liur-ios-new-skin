<body>
  <div id="app">載入中...</div>
  <script>
    // 亮暗色切換功能
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    // 載入時檢查儲存的主題偏好
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    // 把亮暗色按鈕插入到 sidebar 標題旁邊
    function insertThemeToggle() {
      // 等待 Docsify 完全載入
      const appName = document.querySelector('.app-name-link') || document.querySelector('.app-name');
      if (appName && !document.querySelector('.theme-toggle')) {
        const btn = document.createElement('button');
        btn.className = 'theme-toggle';
        btn.title = '切換亮暗色主題';
        btn.onclick = toggleTheme;
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';

        // 嘗試不同的插入方式
        if (appName.parentNode) {
          appName.parentNode.insertBefore(btn, appName.nextSibling);
        } else {
          appName.appendChild(btn);
        }
      }
    }

    // 多次嘗試插入按鈕，確保 Docsify 完全載入
    function tryInsertThemeToggle() {
      insertThemeToggle();
      // 如果還沒插入成功，再試一次
      if (!document.querySelector('.theme-toggle')) {
        setTimeout(insertThemeToggle, 500);
      }
    }

    // 頁面載入後插入按鈕
    window.addEventListener('load', function () {
      setTimeout(tryInsertThemeToggle, 200);
    });

    // Docsify 載入完成後也嘗試插入
    window.addEventListener('DOMContentLoaded', function () {
      setTimeout(tryInsertThemeToggle, 300);
    });

    // 動態修正深色模式元素背景
    function fixDarkModeElements() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      // 搜尋框區塊
      const searchEl = document.querySelector('.sidebar .search');
      if (searchEl) {
        searchEl.style.setProperty('background-color', isDark ? '#1a1a2e' : '', 'important');
        searchEl.style.setProperty('background', isDark ? '#1a1a2e' : '', 'important');
      }
      // 手機版底部導航列
      const toggleEl = document.querySelector('.sidebar-toggle');
      if (toggleEl) {
        toggleEl.style.setProperty('background-color', isDark ? '#1a1a2e' : '', 'important');
      }
    }

    // 頁面載入後執行
    window.addEventListener('load', function () {
      setTimeout(fixDarkModeElements, 100);
      // 監聽主題切換
      const observer = new MutationObserver(function () {
        setTimeout(fixDarkModeElements, 50);
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    });

    (function () {
      var isGithubPages = location.hostname.indexOf('github.io') !== -1;
      window.$docsify = {
        name: '蝦米皮膚設計器',
        repo: '',
        homepage: 'README.md',
        loadSidebar: true,
        subMaxLevel: 0,
        auto2top: true,
        search: {
          placeholder: '搜尋',
          noData: '找不到結果',
          paths: 'auto'
        }
      };
      if (isGithubPages) {
        window.$docsify.basePath = '/rime-liur-ios-new-skin/guide/';
      }
      window.$docsify.alias = {
        '/.*/_sidebar.md': '/_sidebar.md'
      };
    })();

    // 全域浮動「↑ 頂部」按鈕（每頁共用，樣式對齊皮膚設計器）
    (function () {
      let scrollListenersAttached = false;

      function getScrollTop() {
        const main = document.querySelector('.main');
        const mainTop = main ? main.scrollTop : 0;
        const winTop = window.scrollY || document.documentElement.scrollTop || 0;
        return Math.max(mainTop, winTop);
      }

      function scrollToTop() {
        document.querySelector('.main')?.scrollTo({ top: 0, behavior: 'smooth' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function updateScrollTopButton() {
        const btn = document.getElementById('docs-scroll-top-btn');
        if (!btn) return;
        const threshold = window.matchMedia('(max-width: 768px)').matches ? 48 : 240;
        btn.classList.toggle('is-visible', getScrollTop() > threshold);
      }

      function bindScrollListeners(onScroll) {
        if (scrollListenersAttached) return;
        scrollListenersAttached = true;
        window.addEventListener('scroll', onScroll, { passive: true });
        const main = document.querySelector('.main');
        if (main) {
          main.addEventListener('scroll', onScroll, { passive: true });
        }
        window.addEventListener('resize', onScroll, { passive: true });
        const observer = new MutationObserver(function () {
          const node = document.querySelector('.main');
          if (node && !node.dataset.scrollTopBound) {
            node.dataset.scrollTopBound = '1';
            node.addEventListener('scroll', onScroll, { passive: true });
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      }

      function ensureScrollTopButton() {
        let btn = document.getElementById('docs-scroll-top-btn');
        if (!btn) {
          btn = document.createElement('button');
          btn.type = 'button';
          btn.id = 'docs-scroll-top-btn';
          btn.className = 'docs-scroll-top-btn';
          btn.setAttribute('aria-label', '回到頂部');
          btn.title = '回到頂部';
          btn.innerHTML = '<span class="docs-scroll-top-icon" aria-hidden>↑</span><span class="docs-scroll-top-label">頂部</span>';
          btn.addEventListener('click', scrollToTop);
          document.body.appendChild(btn);
          bindScrollListeners(updateScrollTopButton);
        }
        updateScrollTopButton();
      }

      window.$docsify.plugins = [].concat(window.$docsify.plugins || [], function (hook) {
        hook.doneEach(function () {
          ensureScrollTopButton();
          setTimeout(updateScrollTopButton, 80);
        });
      });
    })();
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 懶加載插件 (重要：優化圖檔過多導致的加載緩慢) -->
  <script src="//cdn.jsdelivr.net/npm/docsify-lazy-load-images@latest/dist/docsify-lazy-load-images.min.js"></script>
  <!-- 搜尋插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 圖片縮放 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- Sidebar 摺疊 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- 程式碼複製按鈕 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
